name: Deploy backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "ml/**"
      - ".github/workflows/azure-backend.yml"
      - "backend/Dockerfile"
      - ".dockerignore"
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RG }}
  AZURE_CONTAINERAPP_NAME: ${{ secrets.AZURE_CONTAINERAPP_NAME }}
  AZURE_ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
  IMAGE_NAME: damagescope-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Build and deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: backend/Dockerfile
          acrName: ${{ env.AZURE_ACR_NAME }}
          containerAppName: ${{ env.AZURE_CONTAINERAPP_NAME }}
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          imageToBuild: ${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          targetPort: 8000
          ingress: external
          environmentVariables: MODEL_WEIGHTS_PATH=/app/ml/checkpoints/best.pth OUTPUTS_DIR=/app/backend/outputs EAGER_MODEL_LOAD=0 CORS_ORIGINS=https://black-beach-0144c460f.7.azurestaticapps.net
